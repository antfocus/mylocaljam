<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Waveform rainbow gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8722A"/>
      <stop offset="20%" stop-color="#F5A623"/>
      <stop offset="40%" stop-color="#E85D8A"/>
      <stop offset="60%" stop-color="#A855F7"/>
      <stop offset="80%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Waveform glow -->
    <filter id="waveGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong outer glow for waveform -->
    <filter id="waveOuterGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="blur" in2="blur" operator="over"/>
    </filter>

    <!-- Glass jar gradient (subtle) -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>

    <!-- Glass reflection highlight -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="15%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Lid gradient -->
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4D4D8"/>
      <stop offset="25%" stop-color="#A1A1AA"/>
      <stop offset="50%" stop-color="#C8C8CD"/>
      <stop offset="75%" stop-color="#9A9AA0"/>
      <stop offset="100%" stop-color="#B0B0B8"/>
    </linearGradient>

    <!-- Lid top -->
    <linearGradient id="lidTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E4E4E7"/>
      <stop offset="50%" stop-color="#B8B8BE"/>
      <stop offset="100%" stop-color="#A8A8AE"/>
    </linearGradient>

    <!-- Inner light from waveform -->
    <radialGradient id="innerGlow" cx="50%" cy="52%" r="40%">
      <stop offset="0%" stop-color="rgba(248,170,80,0.12)"/>
      <stop offset="60%" stop-color="rgba(168,85,247,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <!-- Glass edge refraction (color from waveform) -->
    <linearGradient id="refractionLeft" x1="0%" y1="30%" x2="100%" y2="70%">
      <stop offset="0%" stop-color="rgba(232,114,42,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <linearGradient id="refractionRight" x1="100%" y1="30%" x2="0%" y2="70%">
      <stop offset="0%" stop-color="rgba(56,189,248,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>

    <!-- Text gradients -->
    <linearGradient id="orangeText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8722A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="cyanText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Sparkle glow -->
    <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for jar body -->
    <clipPath id="jarClip">
      <path d="M130,130 C125,130 115,145 112,170 L105,310 C105,340 115,355 140,360 L260,360 C285,355 295,340 295,310 L288,170 C285,145 275,130 270,130 Z"/>
    </clipPath>
  </defs>

  <!-- ========== JAR BODY ========== -->

  <!-- Jar body outline (glass) -->
  <path d="M130,130 C125,130 115,145 112,170 L105,310 C105,340 115,355 140,360 L260,360 C285,355 295,340 295,310 L288,170 C285,145 275,130 270,130 Z"
        fill="url(#glassGrad)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Inner glow from waveform light -->
  <path d="M130,130 C125,130 115,145 112,170 L105,310 C105,340 115,355 140,360 L260,360 C285,355 295,340 295,310 L288,170 C285,145 275,130 270,130 Z"
        fill="url(#innerGlow)"/>

  <!-- Color refraction on left edge -->
  <path d="M130,130 C125,130 115,145 112,170 L105,310 C105,340 115,355 140,360 L155,360 L155,130 Z"
        fill="url(#refractionLeft)"/>

  <!-- Color refraction on right edge -->
  <path d="M270,130 C275,130 285,145 288,170 L295,310 C295,340 285,355 260,360 L245,360 L245,130 Z"
        fill="url(#refractionRight)"/>

  <!-- Glass highlight (left side reflection) -->
  <path d="M130,135 C127,140 120,155 117,175 L112,300 C112,310 114,318 118,325 L125,325 L130,175 C132,158 135,145 138,135 Z"
        fill="rgba(255,255,255,0.15)"/>

  <!-- Small secondary highlight -->
  <path d="M140,150 L138,280 L142,280 L144,150 Z"
        fill="rgba(255,255,255,0.08)" rx="2"/>

  <!-- ========== WAVEFORM (inside jar, centered) ========== -->

  <!-- Outer glow layer -->
  <g clip-path="url(#jarClip)" filter="url(#waveOuterGlow)" opacity="0.5">
    <g transform="translate(200,245)">
      <rect x="-82" y="-3" width="6" height="6" rx="2" fill="url(#waveGrad)"/>
      <rect x="-72" y="-8" width="6" height="16" rx="2" fill="url(#waveGrad)"/>
      <rect x="-62" y="-5" width="6" height="10" rx="2" fill="url(#waveGrad)"/>
      <rect x="-52" y="-14" width="6" height="28" rx="2" fill="url(#waveGrad)"/>
      <rect x="-42" y="-10" width="6" height="20" rx="2" fill="url(#waveGrad)"/>
      <rect x="-32" y="-22" width="6" height="44" rx="2" fill="url(#waveGrad)"/>
      <rect x="-22" y="-18" width="6" height="36" rx="2" fill="url(#waveGrad)"/>
      <rect x="-12" y="-30" width="6" height="60" rx="2" fill="url(#waveGrad)"/>
      <rect x="-2" y="-35" width="6" height="70" rx="2" fill="url(#waveGrad)"/>
      <rect x="8" y="-28" width="6" height="56" rx="2" fill="url(#waveGrad)"/>
      <rect x="18" y="-20" width="6" height="40" rx="2" fill="url(#waveGrad)"/>
      <rect x="28" y="-24" width="6" height="48" rx="2" fill="url(#waveGrad)"/>
      <rect x="38" y="-15" width="6" height="30" rx="2" fill="url(#waveGrad)"/>
      <rect x="48" y="-10" width="6" height="20" rx="2" fill="url(#waveGrad)"/>
      <rect x="58" y="-18" width="6" height="36" rx="2" fill="url(#waveGrad)"/>
      <rect x="68" y="-7" width="6" height="14" rx="2" fill="url(#waveGrad)"/>
      <rect x="78" y="-4" width="6" height="8" rx="2" fill="url(#waveGrad)"/>
    </g>
  </g>

  <!-- Main waveform bars -->
  <g clip-path="url(#jarClip)" filter="url(#waveGlow)">
    <g transform="translate(200,245)">
      <rect x="-82" y="-3" width="6" height="6" rx="2" fill="url(#waveGrad)"/>
      <rect x="-72" y="-8" width="6" height="16" rx="2" fill="url(#waveGrad)"/>
      <rect x="-62" y="-5" width="6" height="10" rx="2" fill="url(#waveGrad)"/>
      <rect x="-52" y="-14" width="6" height="28" rx="2" fill="url(#waveGrad)"/>
      <rect x="-42" y="-10" width="6" height="20" rx="2" fill="url(#waveGrad)"/>
      <rect x="-32" y="-22" width="6" height="44" rx="2" fill="url(#waveGrad)"/>
      <rect x="-22" y="-18" width="6" height="36" rx="2" fill="url(#waveGrad)"/>
      <rect x="-12" y="-30" width="6" height="60" rx="2" fill="url(#waveGrad)"/>
      <rect x="-2" y="-35" width="6" height="70" rx="2" fill="url(#waveGrad)"/>
      <rect x="8" y="-28" width="6" height="56" rx="2" fill="url(#waveGrad)"/>
      <rect x="18" y="-20" width="6" height="40" rx="2" fill="url(#waveGrad)"/>
      <rect x="28" y="-24" width="6" height="48" rx="2" fill="url(#waveGrad)"/>
      <rect x="38" y="-15" width="6" height="30" rx="2" fill="url(#waveGrad)"/>
      <rect x="48" y="-10" width="6" height="20" rx="2" fill="url(#waveGrad)"/>
      <rect x="58" y="-18" width="6" height="36" rx="2" fill="url(#waveGrad)"/>
      <rect x="68" y="-7" width="6" height="14" rx="2" fill="url(#waveGrad)"/>
      <rect x="78" y="-4" width="6" height="8" rx="2" fill="url(#waveGrad)"/>
    </g>
  </g>

  <!-- ========== JAR NECK / THREADS ========== -->

  <!-- Jar neck -->
  <rect x="140" y="115" width="120" height="18" rx="2"
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Thread lines on neck -->
  <line x1="142" y1="120" x2="258" y2="120" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>
  <line x1="142" y1="125" x2="258" y2="125" stroke="rgba(255,255,255,0.10)" stroke-width="0.8"/>
  <line x1="142" y1="130" x2="258" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>

  <!-- ========== LID ========== -->

  <!-- Lid body (screw band) -->
  <rect x="132" y="88" width="136" height="30" rx="4"
        fill="url(#lidGrad)" stroke="rgba(180,180,185,0.6)" stroke-width="1"/>

  <!-- Lid ridges (screw grip lines) -->
  <g opacity="0.35">
    <line x1="138" y1="92" x2="138" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="144" y1="92" x2="144" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="150" y1="92" x2="150" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="156" y1="92" x2="156" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="162" y1="92" x2="162" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="168" y1="92" x2="168" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="174" y1="92" x2="174" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="180" y1="92" x2="180" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="186" y1="92" x2="186" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="192" y1="92" x2="192" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="198" y1="92" x2="198" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="204" y1="92" x2="204" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="210" y1="92" x2="210" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="216" y1="92" x2="216" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="222" y1="92" x2="222" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="228" y1="92" x2="228" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="234" y1="92" x2="234" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="240" y1="92" x2="240" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="246" y1="92" x2="246" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="252" y1="92" x2="252" y2="115" stroke="#888" stroke-width="1.2"/>
    <line x1="258" y1="92" x2="258" y2="115" stroke="#888" stroke-width="1.2"/>
  </g>

  <!-- Lid top flat -->
  <rect x="136" y="82" width="128" height="10" rx="3"
        fill="url(#lidTopGrad)" stroke="rgba(180,180,185,0.5)" stroke-width="0.8"/>

  <!-- Lid highlight -->
  <rect x="140" y="84" width="60" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- ========== BOTTOM JAR EDGE ========== -->

  <!-- Slight bottom rim -->
  <path d="M112,350 C112,358 120,365 145,368 L255,368 C280,365 288,358 288,350"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- ========== TEXT: "my local jam" ========== -->

  <!-- "my local" in orange-gold -->
  <text x="112" y="420" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="1" fill="url(#orangeText)">
    my local
  </text>

  <!-- "jam" in neon cyan-blue -->
  <text x="305" y="420" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="1" fill="url(#cyanText)">
    jam
  </text>

  <!-- ========== SPARKLE (lower-right) ========== -->
  <g transform="translate(365,455)" filter="url(#sparkleGlow)" opacity="0.6">
    <!-- Four-pointed star -->
    <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2 Z"
          fill="white"/>
  </g>
</svg>