<!DOCTYPE html>
<html>
<head>
  <title>Logo Preview — myLocalJam</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; margin: 0; padding: 24px; }
    h1 { font-size: 20px; color: #333; margin-bottom: 24px; }
    .comparison { display: flex; gap: 40px; flex-wrap: wrap; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 14px; color: #666; margin: 0 0 16px; }
    .header-mock { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
    .header-mock.dark { background: #1a1a2e; border-color: #333; color: #fff; }
    .search-bar { flex: 1; height: 32px; background: #f0f0f0; border-radius: 16px; }
    .header-mock.dark .search-bar { background: #2a2a3e; }
    .label { font-size: 11px; color: #999; margin-top: 8px; }
    .size-info { font-size: 12px; color: #888; margin-top: 4px; }
    .logo-display { display: flex; align-items: center; gap: 20px; margin: 12px 0; }
    .checkerboard { background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%); background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0px; padding: 12px; border-radius: 8px; display: inline-block; }
  </style>
</head>
<body>
  <h1>Logo Replacement Preview</h1>
  <div class="comparison">

    <div class="card">
      <h2>NEW LOGO — Nav Bar (52×52px)</h2>
      <div class="header-mock">
        <img src="myLocaljam_Logo_v4_transparent_031126.png" width="52" height="52" style="object-fit: contain;">
        <div class="search-bar"></div>
      </div>
      <div class="header-mock dark" style="margin-top: 8px;">
        <img src="myLocaljam_Logo_v4_transparent_031126.png" width="52" height="52" style="object-fit: contain;">
        <div class="search-bar"></div>
      </div>
      <p class="size-info">Used in: page.js (top navigation)</p>
    </div>

    <div class="card">
      <h2>NEW LOGO — Header Jar (60×60px)</h2>
      <div class="logo-display">
        <div class="checkerboard">
          <img src="myLocaljam_Logo_v4_transparent_031126.png" width="60" height="60" style="object-fit: contain;">
        </div>
      </div>
      <p class="size-info">Used in: SiteHeader.js (center jar button)</p>
    </div>

    <div class="card">
      <h2>OLD LOGO — Nav Bar (52×52px)</h2>
      <div class="header-mock">
        <img src="myLocaljam_Logo_104.png" width="52" height="52" style="object-fit: contain;">
        <div class="search-bar"></div>
      </div>
      <div class="header-mock dark" style="margin-top: 8px;">
        <img src="myLocaljam_Logo_104.png" width="52" height="52" style="object-fit: contain;">
        <div class="search-bar"></div>
      </div>
      <p class="size-info">Was: myLocaljam_Logo_104.png</p>
    </div>

    <div class="card">
      <h2>OLD LOGO — Header Jar (60×60px)</h2>
      <div class="logo-display">
        <div class="checkerboard">
          <img src="myLocaljam_Logo_200.png" width="60" height="60" style="object-fit: contain;">
        </div>
      </div>
      <p class="size-info">Was: myLocaljam_Logo_200.png</p>
    </div>

  </div>
</body>
</html>
